#
# Fern site config. Mirrors the OpenShell Fern layout while the NemoClaw docs
# are migrated from the legacy Sphinx/MyST source.
instances:
  - url: nemoclaw.docs.buildwithfern.com/nemoclaw
    custom-domain: docs.nvidia.com/nemoclaw

title: NVIDIA NemoClaw

announcement:
  message: "NVIDIA NemoClaw is <strong>alpha software</strong>. APIs and behavior may change without notice. Do not use in production."

layout:
  searchbar-placement: header
  page-width: 1376px
  sidebar-width: 248px
  content-width: 812px
  tabs-placement: header
  hide-feedback: true

colors:
  accentPrimary:
    dark: "#76B900"
    light: "#76B900"
  background:
    light: "#FFFFFF"
    dark: "#000000"

theme:
  page-actions: toolbar
  footer-nav: minimal

logo:
  dark: ./assets/NVIDIA_dark.svg
  light: ./assets/NVIDIA_light.svg
  height: 20
  href: /nemoclaw/latest
  right-text: NemoClaw

favicon: ./assets/NVIDIA_symbol.svg

js:
  - url: https://assets.adobedtm.com/5d4962a43b79/c1061d2c5e7b/launch-191c2462b890.min.js
    strategy: beforeInteractive

css:
  - ./main.css

navbar-links:
  - type: github
    value: https://github.com/NVIDIA/NemoClaw

experimental:
  basepath-aware: true

versions:
  - display-name: Latest
    path: ../docs/index.yml
    slug: latest

redirects:
  - source: "/nemoclaw/index.html"
    destination: "/nemoclaw/latest"
  - source: "/nemoclaw/index"
    destination: "/nemoclaw/latest"
  - source: "/nemoclaw/latest/index.html"
    destination: "/nemoclaw/latest"
  - source: "/nemoclaw/latest/index"
    destination: "/nemoclaw/latest"
  - source: "/nemoclaw/latest/:path*/index.html"
    destination: "/nemoclaw/latest/:path*"
  - source: "/nemoclaw/:path*/index.html"
    destination: "/nemoclaw/:path*"
  - source: "/nemoclaw/:path*.html"
    destination: "/nemoclaw/:path*"
  - source: "/nemoclaw/latest/reference/inference-profiles"
    destination: "/nemoclaw/latest/inference/inference-options"
  - source: "/nemoclaw/latest/get-started/windows-setup"
    destination: "/nemoclaw/latest/get-started/windows-preparation"
  - source: "/nemoclaw/latest/deployment/set-up-telegram-bridge"
    destination: "/nemoclaw/latest/manage-sandboxes/messaging-channels"
  - source: "/nemoclaw/latest/workspace/workspace-files"
    destination: "/nemoclaw/latest/manage-sandboxes/workspace-files"
  - source: "/nemoclaw/latest/workspace/backup-restore"
    destination: "/nemoclaw/latest/manage-sandboxes/backup-restore"
